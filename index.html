<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Digital Eksklusif</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* --- BACKGROUND SISA LAYAR HP MENJADI PUTIH BERSIH --- */
        body, html { 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* --- BINGKAI UTAMA: Mengunci ukuran dan rasio murni 9:16 di semua jenis HP --- */
        .app-container {
            position: relative;
            width: 100%;
            max-width: 450px; 
            max-height: 800px; 
            aspect-ratio: 9 / 16;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        /* --- 1. OVERLAY AWAL --- */
        #overlay-awal {
            position: absolute; inset: 0; z-index: 100;
            background: url('awal.png') center/cover no-repeat;
            display: block; transition: opacity 1s ease;
        }

        .btn-buka {
            position: absolute;
            bottom: 44%; 
            left: 50%;
            transform: translateX(-50%);
            padding: 1.25vh 6.5vw; border: 2px solid rgba(255,255,255,0.5); border-radius: 12px;
            background: #c18f30; color: white; cursor: pointer; font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px; font-size: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: all 0.3s ease;
            white-space: nowrap;
        }

        /* --- 2. SISTEM GERBANG --- */
        #gate-container { position: absolute; inset: 0; z-index: 50; display: flex; overflow: hidden; cursor: pointer; perspective: 1200px; }
        .gate { 
            width: 50%; height: 100%; 
            transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1), opacity 3s; 
            background-image: url('gerbang.png'); 
            background-size: 200% 100%; 
            background-repeat: no-repeat; 
            backface-visibility: hidden; 
        }
        .gate-left { background-position: left center; transform-origin: left; }
        .gate-right { background-position: right center; transform-origin: right; }
        .gate-open .gate-left { transform: rotateY(-110deg); opacity: 0; }
        .gate-open .gate-right { transform: rotateY(110deg); opacity: 0; }

        /* --- 3. BACKGROUND MEDIA --- */
        #bg-container { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .bg-media { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: opacity 1.5s; opacity: 0; }

        /* --- 4. IKON MENU (RESPONSIF BERBASIS PERSEN) --- */
        #main-content { position: absolute; inset: 0; z-index: 10; opacity: 0; transition: opacity 2s ease-in-out; pointer-events: none; }
        #hint-text { position: absolute; top: 25%; left: 50%; transform: translateX(-50%); color: #8a9549; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,0,0,0.5); animation: softFlicker 3s infinite ease-in-out; pointer-events: none; text-align: center; width: 100%; }
        @keyframes softFlicker { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        
        .icon-item { position: absolute; height: auto; cursor: pointer; pointer-events: auto; animation: floatWobble 6s ease-in-out infinite; }
        .icon-item img { width: 100%; height: auto; display: block; filter: drop-shadow(4px 6px 10px rgba(0, 0, 0, 0.4)); transition: transform 0.3s ease; }
        @keyframes floatWobble { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-1vh) rotate(1deg); } 50% { transform: translateY(-0.5vh) rotate(-1deg); } 75% { transform: translateY(-1.25vh) rotate(0.5deg); } }
        
        /* Konversi lebar ikon statis px ke % terhadap kontainer utama 450px */
        .icon-1 { width: 25.5%; top: 36%; left: 8.5%; }
        .icon-2 { width: 26.6%; top: 48%; left: 45%; }
        .icon-3 { width: 29.3%; top: 43%; left: 68%; }
        .icon-4 { width: 22.2%; top: 59.5%; left: 54.5%; }
        .icon-5 { width: 31.1%; top: 71%; left: 43%; }
        .icon-6 { width: 44.4%; top: 56%; left: 8%; }

        /* --- 5. KUCING, MAKANAN, RUMPUT (RESPONSIF BERBASIS PERSEN) --- */
        #cat-area { position: absolute; bottom: 0; left: 0; width: 100%; height: 32.5%; z-index: 20; pointer-events: none; }
        
        #food-wrapper { 
            position: absolute; 
            pointer-events: auto; 
            z-index: 50; 
            width: 20%; 
            left: 5.3%; 
            bottom: 7%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .pulse-active { animation: bowlShake 0.8s infinite ease-in-out; }
        @keyframes bowlShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-1.5px) rotate(-1deg); } 75% { transform: translateX(1.5px) rotate(1deg); } }
        #cat-food-icon { width: 100%; cursor: pointer; filter: drop-shadow(4px 10px 8px rgba(0,0,0,0.6)); }
        
        #cat-container { 
            position: absolute; 
            left: 26.5%; 
            pointer-events: auto; 
            z-index: 21; 
            width: 33.3%; 
            height: auto;
            aspect-ratio: 1 / 1;
            bottom: -4%; 
        }
        #cat-bubble { position: absolute; top:15%; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.9); padding: 1.6px 5px; border-radius: 8px; font-size: 8px; font-weight: bold; color: #333; opacity: 0; transition: opacity 0.3s; z-index: 100; white-space: nowrap; }
        .cat-vid { width: 100%; height: 100%; object-fit: contain; }
        
        #grass-layer { position: absolute; bottom: 0; left: 0; width: 100%; pointer-events: none; z-index: 30; display: flex; align-items: flex-end; }
        #grass-image { width: 100%; height: auto; }

        /* --- 6. MODAL SYSTEM --- */
        #modal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 0px; width: 100%; max-width: 450px; height: 100%; max-height: 100vh; display: flex; flex-direction: column; position: relative; }
        #m-body { overflow-y: auto; margin-top: 15px; padding-right: 5px; position: relative; flex: 1; display: flex; flex-direction: column; }
        #m-body::-webkit-scrollbar { width: 4px; }
        #m-body::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }

        .tentang-wrapper { position: relative; width: 100%; max-width: 450px; margin: 0 auto; text-align: center; overflow: hidden; }
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ig-pria, .ig-wanita, .foto-pria, .foto-wanita { position: absolute; }
        .ig-pria, .ig-wanita { text-decoration: none; font-size: 3.6vw; font-weight: 800; color: #d4af37; pointer-events: auto; white-space: nowrap; animation: igPulse 2s infinite ease-in-out; }
        @keyframes igPulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(212,175,55,0)); } 50% { transform: scale(1.06); filter: drop-shadow(0 0 4px rgba(212,175,55,0.6)); } }
        .foto-pria, .foto-wanita { object-fit: contain; pointer-events: none; }
        @media (min-width: 450px) { .ig-pria, .ig-wanita { font-size: 16px; } }

        /* --- 🌟 BAGIAN FORM UCAPAN YANG SUDAH DIUBAH WARNANYA 🌟 --- */
        .form-ucapan { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-bottom: 20px; 
            background: #414528; /* Mengubah background form kirim ucapan menjadi Hijau Sage */
            padding: 15px; 
            border-radius: 14px; 
            border: 1px solid;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .form-ucapan input, .form-ucapan textarea { 
            width: 100%; 
            padding: 10px 14px; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 10px; 
            font-size: 13px; 
            outline: none; 
            background: #ffffff;
            transition: all 0.3s;
        }
        /* Mengubah warna teks tamu saat mengetik nama */
        .form-ucapan input {
            color: #414528; 
            font-weight: 600;
        }
        /* Mengubah warna teks tamu saat mengetik isi ucapan */
        .form-ucapan textarea {
            color: #414528; /* Hijau gelap agar kontras dan mudah dibaca */
        }
        /* Mengubah warna placeholder 'Nama Anda' */
        .form-ucapan input::placeholder {
            color: #414528;
            opacity:;
        }
        /* Mengubah warna placeholder 'Tuliskan ucapan...' */
        .form-ucapan textarea::placeholder {
            color: #414528;
        }
        .form-ucapan input:focus, .form-ucapan textarea:focus { 
            border-color: #ffffff; 
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
        }
        /* Mengubah tombol kirim ucapan agar match dengan tema */
        .btn-kirim-ucapan { 
            background: white; /* Hijau gelap botol agar kontras di atas bg sage */
            color: 414528; 
            border: none; 
            padding: 8px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 12px; 
            transition: background 0.2s; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-kirim-ucapan:hover { background: #2f321d; }

        /* --- 🌟 AREA ALIRAN BUBBLE CHAT 🌟 --- */
        .area-komentar { 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            margin-top: 5px; 
            flex: 1;
            overflow-y: auto; 
            padding: 5px 6px 15px 4px;
        }
        .area-komentar::-webkit-scrollbar { width: 3px; }
        .area-komentar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        /* Wadah Bubble tunggal */
        .chat-row {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        /* Mengatur posisi ke kiri (tamu) atau kanan (mempelai) */
        .chat-row.tamu { align-items: flex-start; }
        .chat-row.mempelai { align-items: flex-end; }

        .nama-komentator { 
            font-size: 11px; 
            font-weight: 600; 
            color: #414528; 
            margin-bottom: 3px; 
            margin-left: 6px;
            margin-right: 6px;
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }
        
        /* Base Bubble Chat */
        .box-komentar { 
            max-width: 85%; 
            padding: 10px 14px; 
            font-size: 13.5px;
            line-height: 1.45;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        
        /* Bubble Chat Tamu (Warna Abu Kiri) */
        .chat-row.tamu .box-komentar {
            background: #e9edd9; 
            color: #3c4724;
            border-radius: 4px 16px 16px 16px; 
            text-align: left;
        }
        
        /* Bubble Chat Mempelai (Warna Sage Green Kanan) */
        .chat-row.mempelai .box-komentar {
            background: #e2e8f0; /* Default fallback */
            border-radius: 16px 4px 16px 16px;
            text-align: right;
        }
        .box-komentar.pinned { 
            background: #e9edd9 !important; /* Warna Sage Green Halus */
            color: #3c4724;
            border: 1px solid rgba(138, 149, 73, 0.2);
        }
        .badge-owner { 
            background: #8a9549; 
            color: white; 
            font-size: 9px; 
            padding: 1px 5px; 
            border-radius: 4px; 
            font-weight: normal; 
        }
        .isi-komentator { font-size: 13px; }

        /* --- RANGKAIAN ACARA & COUNTDOWN --- */
        .acara-container { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; margin-top: 10px; }
        .info-lokasi-waktu { font-size: 14px; color: #444; font-weight: 600; margin-bottom: 15px; line-height: 1.5; }
        .countdown-box-wrapper { display: flex; gap: 12px; justify-content: center; margin-bottom: 25px; }
        .flip-segment { display: flex; flex-direction: column; align-items: center; }
        .flip-card-container { display: flex; gap: 2px; }
        .flip-card { position: relative; background: #414528; color: #fff; width: 32px; height: 46px; font-size: 26px; font-weight: 700; text-align: center; line-height: 46px; border-radius: 4px; box-shadow: 0 3px 6px rgba(120, 120, 120, 0.3); overflow: hidden; }
        .flip-card::after { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 1px; background: rgba(255, 255, 255, 0.15); z-index: 5; }
        .flip-label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; font-weight: bold; }

        .custom-img-container { width: 100%; display: flex; justify-content: center; margin-bottom: 15px; }
        .custom-img-container img { width: 100%; height: auto; max-width: 450px; display: block; object-fit: cover; }
        .maps-img-container { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .maps-img-container a { display: block; width: 100%; max-width: 450px; cursor: pointer; transition: transform 0.2s; }
        .maps-img-container a:hover { transform: scale(1.02); }
        .maps-img-container img { width: 100%; height: auto; display: block; object-fit: cover; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12)); }

        #lightbox { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; cursor: pointer; }
        #lightbox img { max-width: 90%; max-height: 80%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">

        <div id="overlay-awal">
            <button class="btn-buka" onclick="bukaUndangan()">Mulai</button>
        </div>

        <div id="gate-container" class="hidden" onclick="bukaGerbang()">
            <div class="gate gate-left"></div>
            <div class="gate gate-right"></div>
        </div>

        <div id="bg-container">
            <video id="video1" class="bg-media" playsinline muted><source src="video1.mp4" type="video/mp4"></video>
            <img id="fotoBackground" class="bg-media" src="bgisi.png"> 
        </div>

        <div id="main-content">
            <div id="hint-text">Klik benda melayang untuk detail acara</div>
            <div class="icon-item icon-1" onclick="putarSuara('Ucapan & Doa', 'suara-ucapan')"><img src="ucapan.png"></div>
            <div class="icon-item icon-2" onclick="putarSuara('Tentang Kami', 'suara-tentang', true)"><img src="tentangkami.png"></div>
            <div class="icon-item icon-3" onclick="putarSuara('Love Story', 'suara-story')"><img src="lovestory.png"></div>
            <div class="icon-item icon-4" onclick="putarSuara('Rangkaian Acara', 'suara-acara')"><img src="acara.png"></div>
            <div class="icon-item icon-5" onclick="putarSuara('Waktu & Tempat', 'suara-alamat')"><img src="alamat.png"></div>
            <div class="icon-item icon-6" onclick="putarSuara('Galeri', 'suara-galeri')"><img src="galeri.png"></div>

            <div id="cat-area">
                <div id="food-wrapper" class="pulse-active" onclick="panggilKucing()"><img src="wadahmakan.png" id="cat-food-icon"></div>
                <div id="cat-container">
                    <div id="cat-bubble">meow meow</div>
                    <video id="cat-walk-right" class="cat-vid" loop playsinline muted><source src="kucingkanan.webm" type="video/mp4"></video>
                    <video id="cat-walk-left" class="cat-vid hidden" loop playsinline muted><source src="kucingkiri.webm" type="video/mp4"></video>
                    
                    <!-- AREA MODIFIKASI CUSTOM POSISI & UKURAN KUCING MAKAN -->
                    <video id="cat-eat" class="cat-vid hidden" loop playsinline muted 
                           style="width: 100%; height: 100%; object-fit: contain; transform: scale(0.85); margin-left: -19%; margin-top: -3%;">
                        <source src="kucingmakan.webm" type="video/mp4">
                    </video>
                </div>
                <div id="grass-layer"><img src="rumput.png" id="grass-image"></div>
            </div>
        </div>

    </div>

    <div id="modal" onclick="tutup()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-title" style="color: #d4af37; text-align: center;"></h2>
            <div id="m-body"></div>
            <button onclick="tutup()" style="margin-top:15px; padding: 10px; border: none; border-radius: 8px; background: #d4af37; color: white; cursor: pointer; font-weight: bold;">Tutup</button>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <audio id="sfx-gerbang" src="sound-gerbang.mp3"></audio>
    <audio id="sfx-narasi-gerbang" src="vogerbang.mp3"></audio>
    <audio id="bgm-utama" src="moon.mp3" preload="auto"></audio>
    <audio id="suara-ucapan" src="vodoa.mp3"></audio>
    <audio id="suara-tentang" src="vokami.mp3"></audio>
    <audio id="suara-story" src="vobertemu.mp3"></audio>
    <audio id="suara-acara" src="voacara.mp3"></audio>
    <audio id="suara-alamat" src="votanggal.mp3"></audio>
    <audio id="suara-galeri" src="vogaleri.mp3"></audio>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxJXFO0R5_i9Z_06JNpUT1FLow3wpSkK7XEaSx4QE-9rT2fo0V2grsGjTOitG3qbCjv/exec";

        const v1 = document.getElementById('video1');
        const fotoBg = document.getElementById('fotoBackground');
        const catBox = document.getElementById('cat-container');
        const bubble = document.getElementById('cat-bubble');
        const walkR = document.getElementById('cat-walk-right');
        const walkL = document.getElementById('cat-walk-left');
        const eatV = document.getElementById('cat-eat');
        const bgm = document.getElementById('bgm-utama');
        const narasiGerbang = document.getElementById('sfx-narasi-gerbang');
        const foodWrapper = document.getElementById('food-wrapper');
        
        let suaraAktif = null;
        let volumeInterval = null;
        let countdownInterval = null;

        function setBgmVolume(targetVolume) {
            clearInterval(volumeInterval);
            let step = 0.02;
            volumeInterval = setInterval(() => {
                let currentVol = bgm.volume;
                if (Math.abs(currentVol - targetVolume) < step) {
                    bgm.volume = targetVolume;
                    clearInterval(volumeInterval);
                } else {
                    bgm.volume += (targetVolume > currentVol ? step : -step);
                }
            }, 50);
        }

        function bukaUndangan() {
            document.getElementById('overlay-awal').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay-awal').classList.add('hidden');
                document.getElementById('gate-container').classList.remove('hidden');
            }, 1000);
        }

        function bukaGerbang() {
            document.getElementById('gate-container').classList.add('gate-open');
            v1.style.opacity = '1'; v1.play();
            bgm.currentTime = 2.24; bgm.volume = 0.5; bgm.play(); bgm.loop = true;
            document.getElementById('sfx-gerbang').play();
            setBgmVolume(0.1); 
            setTimeout(() => { narasiGerbang.play(); }, 800); 
            narasiGerbang.onended = () => { setBgmVolume(0.5); };
            setTimeout(() => {
                v1.style.opacity = '0'; fotoBg.style.opacity = '1';
                document.getElementById('main-content').style.opacity = '1';
                startPatrol();
            }, 3000);
            setTimeout(() => { document.getElementById('gate-container').classList.add('hidden'); }, 3100);
        }

        function zoomFoto(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lb.style.display = 'flex';
        }

        function simpanUcapan() {
            const nama = document.getElementById('input-nama').value.trim();
            const teks = document.getElementById('input-teks').value.trim();
            
            if(!nama || !teks) {
                alert("Harap isi nama dan ucapan doa restu Anda.");
                return;
            }

            const btnKirim = document.querySelector('.btn-kirim-ucapan');
            btnKirim.innerText = "Mengirim...";
            btnKirim.disabled = true;

            fetch(`${SCRIPT_URL}?nama=${encodeURIComponent(nama)}&teks=${encodeURIComponent(teks)}`, {
                method: 'POST'
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('input-nama').value = '';
                document.getElementById('input-teks').value = '';
                tampilkanUcapan(); 
                alert("Terima kasih atas doa restunya!");
            })
            .catch(err => {
                console.error("Fetch error:", err);
                setTimeout(() => {
                    document.getElementById('input-nama').value = '';
                    document.getElementById('input-teks').value = '';
                    tampilkanUcapan();
                }, 1000);
            })
            .finally(() => {
                btnKirim.innerText = "Kirim Ucapan";
                btnKirim.disabled = false;
            });
        }

        function tampilkanUcapan() {
            const container = document.getElementById('box-list-ucapan');
            if(!container) return;

            container.innerHTML = `<p style="text-align:center; color:#999; font-size:12px; padding: 10px;">Memuat ucapan doa...</p>`;

            fetch(SCRIPT_URL + '?_t=' + Date.now())
            .then(res => res.json())
            .then(data => {
                let htmlKomentar = `
                    <div class="chat-row mempelai">
                        <div class="nama-komentator">Latifa & Ilmi <span class="badge-owner">Mempelai</span></div>
                        <div class="box-komentar pinned">
                            <div class="isi-komentator">Terima kasih ucapan & doa nya, ditunggu kehadiran saudara/i semua🤍</div>
                        </div>
                    </div>
                `;

                data.reverse().forEach(item => {
                    htmlKomentar += `
                        <div class="chat-row tamu">
                            <div class="nama-komentator">${escapeHTML(item.nama)}</div>
                            <div class="box-komentar">
                                <div class="isi-komentator">${escapeHTML(item.teks)}</div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = htmlKomentar;
                container.scrollTop = 0;
            })
            .catch(err => {
                console.error("Gagal memuat data:", err);
                container.innerHTML = `<p style="text-align:center; color:#ff4d4d; font-size:12px; padding: 10px;">Gagal memuat daftar ucapan.</p>`;
            });
        }

        function escapeHTML(text) {
            return text.replace(/[&<>"']/g, function(m) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
            });
        }

        function runCountdown() {
            const targetDate = new Date("June 14, 2026 00:00:00").getTime();
            
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const now = new Date().getTime();
                const distance = targetDate - now;

                let days = Math.floor(distance / (1000 * 60 * 60 * 24));
                let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60 * 60));
                let seconds = Math.floor((distance % (1000 * 60)) / 1000);

                if (distance < 0) {
                    clearInterval(countdownInterval);
                    days = hours = minutes = seconds = 0;
                }

                const dStr = String(days).padStart(2, '0');
                const hStr = String(hours).padStart(2, '0');
                const mStr = String(minutes).padStart(2, '0');
                const sStr = String(seconds).padStart(2, '0');

                if (document.getElementById("d1")) {
                    document.getElementById("d1").innerText = dStr[0];
                    document.getElementById("d2").innerText = dStr[1];
                    document.getElementById("h1").innerText = hStr[0];
                    document.getElementById("h2").innerText = hStr[1];
                    document.getElementById("m1").innerText = mStr[0];
                    document.getElementById("m2").innerText = mStr[1];
                    document.getElementById("s1").innerText = sStr[0];
                    document.getElementById("s2").innerText = sStr[1];
                }
            }, 1000);
        }

        function startPatrol() {
            if (window.isEating) return;
            bubble.innerText = "meow meow"; bubble.style.opacity = "1";
            walkL.classList.add('hidden'); walkR.classList.remove('hidden'); walkR.play();
            catBox.style.transition = "left 6s linear, bottom 0.5s ease";
            catBox.style.left = "calc(110% - 33.3%)"; 
            setTimeout(() => {
                if (window.isEating) return;
                walkR.classList.add('hidden'); walkL.classList.remove('hidden'); walkL.play();
                catBox.style.left = "26.6%"; 
                setTimeout(() => { if (!window.isEating) startPatrol(); }, 7000);
            }, 7000);
        }

        function panggilKucing() {
            if (window.isEating) return;
            window.isEating = true;
            foodWrapper.classList.remove('pulse-active');
            bubble.innerText = "Terima kasih, meow!"; bubble.style.opacity = "1";
            catBox.style.transition = "left 3s ease-out, bottom 3s ease-out"; 
            catBox.style.left = "3.3%"; 
            catBox.style.bottom = "18.5%"; 
            walkR.classList.add('hidden'); walkL.classList.remove('hidden'); walkL.play();
            setTimeout(() => {
                walkL.classList.add('hidden'); eatV.classList.remove('hidden'); eatV.play();
                catBox.style.transition = "none"; 
                catBox.style.width = "33.3%"; 
                setTimeout(() => {
                    eatV.classList.add('hidden'); bubble.style.opacity = "0";
                    window.isEating = false; foodWrapper.classList.add('pulse-active');
                    catBox.style.transition = "bottom 0.5s ease, width 0.5s ease";
                    catBox.style.bottom = "-4%"; 
                    catBox.style.width = "33.3%"; 
                    startPatrol();
                }, 5000);
            }, 3000); 
        }
