<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Digital Eksklusif</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }

        /* --- KUNCI RASIO LAYAR 9:19 (STANDAR HP MODERN) --- */
        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            aspect-ratio: 9 / 19.5; 
            max-width: 450px; 
            max-height: 920px; 
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* --- 1. OVERLAY AWAL --- */
        #overlay-awal {
            position: absolute; inset: 0; z-index: 100;
            background: url('awal.png') center/100% 100% no-repeat;
            display: flex; align-items: flex-end; justify-content: center; 
            padding-bottom: 120%; transition: opacity 1s ease;
        }

        .btn-buka {
            padding: 12px 35px; border: 2px solid rgba(255,255,255,0.5); border-radius: 12px;
            background: #c18f30; color: white; cursor: pointer; font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px; font-size: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: all 0.3s ease;
        }

        /* --- 2. SISTEM GERBANG --- */
        #gate-container { position: absolute; inset: 0; z-index: 50; display: flex; overflow: hidden; cursor: pointer; perspective: 1200px; }
        .gate { width: 50%; height: 100%; transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1), opacity 3s; background-image: url('gerbang.png'); background-size: 200% 100%; background-repeat: no-repeat; backface-visibility: hidden; }
        .gate-left { background-position: 0% center; transform-origin: left; }
        .gate-right { background-position: 100% center; transform-origin: right; }
        .gate-open .gate-left { transform: rotateY(-110deg); opacity: 0; }
        .gate-open .gate-right { transform: rotateY(110deg); opacity: 0; }

        /* --- 3. BACKGROUND MEDIA --- */
        #bg-container { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .bg-media { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: opacity 1.5s; opacity: 0; }

        /* --- 4. IKON MENU --- */
        #main-content { position: absolute; inset: 0; z-index: 10; opacity: 0; transition: opacity 2s ease-in-out; pointer-events: none; }
        
        #hint-text { position: absolute; top: 24%; left: 50%; transform: translateX(-50%); color: #8a9549; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,0,0,0.5); animation: softFlicker 3s infinite ease-in-out; pointer-events: none; text-align: center; width: 100%; }
        @keyframes softFlicker { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        
        .icon-item { position: absolute; height: auto; cursor: pointer; pointer-events: auto; animation: floatWobble 6s ease-in-out infinite; }
        .icon-item img { width: 100%; height: auto; display: block; filter: drop-shadow(4px 6px 10px rgba(0, 0, 0, 0.4)); }
        @keyframes floatWobble { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-6px) rotate(0.5deg); } 50% { transform: translateY(-3px) rotate(-0.5deg); } 75% { transform: translateY(-8px) rotate(0.2deg); } }
        
        /* Posisi Koordinat & Ukuran Persen */
        .icon-1 { width: 26%; top: 37%; left: 5%; }
        .icon-2 { width: 28%; top: 46%; left: 45%; }
        .icon-3 { width: 30%; top: 42%; left: 67.5%; }
        .icon-4 { width: 23%; top: 58.5%; left: 54.5%; }
        .icon-5 { width: 33%; top: 70%; left: 43%; }
        .icon-6 { width: 48%; top: 54%; left: 0%; }

        /* --- 5. AREA INTERAKTIF KUCING (DIPERBAIKI) --- */
        #cat-area { 
            position: absolute; 
            bottom: 9%; /* Dinaikkan agar tidak terpotong di bagian bawah HP mana pun */
            left: 0; 
            width: 100%; 
            height: 180px; 
            z-index: 20; 
            pointer-events: none; 
        }
        #food-wrapper { 
            position: absolute; 
            pointer-events: auto; 
            z-index: 50; 
            width: 85px; 
            left: 20px; 
            bottom: 12px; /* Disesuaikan agar pas berada di atas rumput */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .pulse-active { animation: bowlShake 0.8s infinite ease-in-out; }
        @keyframes bowlShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-1px) rotate(-0.5deg); } 75% { transform: translateX(1px) rotate(0.5deg); } }
        #cat-food-icon { width: 100%; cursor: pointer; filter: drop-shadow(4px 10px 8px rgba(0,0,0,0.6)); }
        
        #cat-container { 
            position: absolute; 
            left: 110px; 
            pointer-events: auto; 
            z-index: 21; 
            width: 140px; 
            height: 140px; 
            bottom: 2px; /* Kaki kucing menapak sempurna di rumput saat patroli */
        }
        #cat-bubble { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.9); padding: 2px 6px; border-radius: 8px; font-size: 11px; font-weight: bold; color: #333; opacity: 0; transition: opacity 0.3s; z-index: 100; white-space: nowrap; }
        .cat-vid { width: 100%; height: 100%; object-fit: contain; }
        #grass-layer { position: absolute; bottom: 0; left: 0; width: 100%; pointer-events: none; z-index: 30; display: flex; align-items: flex-end; }
        #grass-image { width: 100%; height: auto; margin-bottom: -5px; }

        /* --- 6. MODAL SYSTEM --- */
        #modal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 0px; width: 100%; max-width: 450px; height: 100%; max-height: 100vh; display: flex; flex-direction: column; position: relative; }
        #m-body { overflow-y: auto; margin-top: 15px; padding-right: 5px; position: relative; }
        #m-body::-webkit-scrollbar { width: 4px; }
        #m-body::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }

        .tentang-wrapper { position: relative; width: 100%; max-width: 450px; margin: 0 auto; text-align: center; overflow: hidden; }
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ig-pria, .ig-wanita { position: absolute; text-decoration: none; font-size: 3.6vw; font-weight: 800; color: #d4af37; pointer-events: auto; white-space: nowrap; animation: igPulse 2s infinite ease-in-out; }
        @keyframes igPulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(212,175,55,0)); } 50% { transform: scale(1.06); filter: drop-shadow(0 0 4px rgba(212,175,55,0.6)); } }
        @media (min-width: 450px) { .ig-pria, .ig-wanita { font-size: 16px; } }

        /* --- KOLOM UCAPAN & KOMENTAR --- */
        .form-ucapan { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
        .form-ucapan input, .form-ucapan textarea { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; outline: none; }
        .form-ucapan input:focus, .form-ucapan textarea:focus { border-color: #d4af37; }
        .btn-kirim-ucapan { background: #d4af37; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: background 0.2s; }
        .btn-kirim-ucapan:hover { background: #b8952e; }
        
        .area-komentar { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
        .area-komentar::-webkit-scrollbar { width: 3px; }
        .area-komentar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        .box-komentar { background: #f4f4f4; padding: 10px; border-radius: 8px; border-left: 4px solid #d4af37; text-align: left; }
        .box-komentar.pinned { background: #fffcf2; border-left: 4px solid #8a9549; box-shadow: inset 0 0 4px rgba(212,175,55,0.1); }
        .nama-komentator { font-size: 12px; font-weight: bold; color: #333; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
        .badge-owner { background: #8a9549; color: white; font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: normal; }
        .isi-komentator { font-size: 13px; color: #555; line-height: 1.4; word-break: break-word; }

        /* --- RANGKAIAN ACARA & COUNTDOWN --- */
        .acara-container { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; margin-top: 10px; }
        .info-lokasi-waktu { font-size: 14px; color: #444; font-weight: 600; margin-bottom: 15px; line-height: 1.5; }
        .countdown-box-wrapper { display: flex; gap: 12px; justify-content: center; margin-bottom: 25px; }
        .flip-segment { display: flex; flex-direction: column; align-items: center; }
        .flip-card-container { display: flex; gap: 2px; }
        .flip-card { position: relative; background: #414528; color: #fff; width: 32px; height: 46px; font-size: 26px; font-weight: 700; text-align: center; line-height: 46px; border-radius: 4px; box-shadow: 0 3px 6px rgba(120, 120, 120, 0.3); overflow: hidden; }
        .flip-card::after { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 1px; background: rgba(255, 255, 255, 0.15); z-index: 5; }
        .flip-label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; font-weight: bold; }

        .custom-img-container { width: 100%; display: flex; justify-content: center; margin-bottom: 15px; }
        .custom-img-container img { width: 100%; height: auto; max-width: 450px; display: block; object-fit: cover; }
        .maps-img-container { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .maps-img-container a { display: block; width: 100%; max-width: 450px; cursor: pointer; }
        .maps-img-container img { width: 100%; height: auto; display: block; object-fit: cover; }

        #lightbox { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; cursor: pointer; }
        #lightbox img { max-width: 90%; max-height: 80%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="overlay-awal">
            <button class="btn-buka" onclick="bukaUndangan()">Mulai</button>
        </div>

        <div id="gate-container" class="hidden" onclick="bukaGerbang()">
            <div class="gate gate-left"></div>
            <div class="gate gate-right"></div>
        </div>

        <div id="bg-container">
            <video id="video1" class="bg-media" playsinline muted><source src="video1.mp4" type="video/mp4"></video>
            <img id="fotoBackground" class="bg-media" src="bgisi.png"> 
        </div>

        <div id="main-content">
            <div id="hint-text">Klik benda melayang untuk detail acara</div>
            <div class="icon-item icon-1" onclick="putarSuara('Ucapan & Doa', 'suara-ucapan')"><img src="ucapan.png"></div>
            <div class="icon-item icon-2" onclick="putarSuara('Tentang Kami', 'suara-tentang', true)"><img src="tentangkami.png"></div>
            <div class="icon-item icon-3" onclick="putarSuara('Love Story', 'suara-story')"><img src="lovestory.png"></div>
            <div class="icon-item icon-4" onclick="putarSuara('Rangkaian Acara', 'suara-acara')"><img src="acara.png"></div>
            <div class="icon-item icon-5" onclick="putarSuara('Waktu & Tempat', 'suara-alamat')"><img src="alamat.png"></div>
            <div class="icon-item icon-6" onclick="putarSuara('Galeri', 'suara-galeri')"><img src="galeri.png"></div>

            <div id="cat-area">
                <div id="food-wrapper" class="pulse-active" onclick="panggilKucing()"><img src="wadahmakan.png" id="cat-food-icon"></div>
                <div id="cat-container">
                    <div id="cat-bubble">meow meow</div>
                    <video id="cat-walk-right" class="cat-vid" loop playsinline muted><source src="kucingkanan.webm" type="video/mp4"></video>
                    <video id="cat-walk-left" class="cat-vid hidden" loop playsinline muted><source src="kucingkiri.webm" type="video/mp4"></video>
                    <video id="cat-eat" class="cat-vid hidden" loop playsinline muted><source src="kucingmakan.webm" type="video/mp4"></video>
                </div>
                <div id="grass-layer"><img src="rumput.png" id="grass-image"></div>
            </div>
        </div>
    </div>

    <div id="modal" onclick="tutup()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-title" style="color: #d4af37; text-align: center;"></h2>
            <div id="m-body"></div>
            <button onclick="tutup()" style="margin-top:15px; padding: 10px; border: none; border-radius: 8px; background: #d4af37; color: white; cursor: pointer; font-weight: bold;">Tutup</button>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>

    <audio id="sfx-gerbang" src="sound-gerbang.mp3"></audio>
    <audio id="sfx-narasi-gerbang" src="vogerbang.mp3"></audio>
    <audio id="bgm-utama" src="moon.mp3" preload="auto"></audio>
    <audio id="suara-ucapan" src="vodoa.mp3"></audio>
    <audio id="suara-tentang" src="vokami.mp3"></audio>
    <audio id="suara-story" src="vobertemu.mp3"></audio>
    <audio id="suara-acara" src="voacara.mp3"></audio>
    <audio id="suara-alamat" src="votanggal.mp3"></audio>
    <audio id="suara-galeri" src="vogaleri.mp3"></audio>

    <script>
        const v1 = document.getElementById('video1');
        const fotoBg = document.getElementById('fotoBackground');
        const catBox = document.getElementById('cat-container');
        const bubble = document.getElementById('cat-bubble');
        const walkR = document.getElementById('cat-walk-right');
        const walkL = document.getElementById('cat-walk-left');
        const eatV = document.getElementById('cat-eat');
        const bgm = document.getElementById('bgm-utama');
        const narasiGerbang = document.getElementById('sfx-narasi-gerbang');
        const foodWrapper = document.getElementById('food-wrapper');
        
        let suaraAktif = null;
        let volumeInterval = null;
        let countdownInterval = null;

        function setBgmVolume(targetVolume) {
            clearInterval(volumeInterval);
            let step = 0.02;
            volumeInterval = setInterval(() => {
                let currentVol = bgm.volume;
                if (Math.abs(currentVol - targetVolume) < step) {
                    bgm.volume = targetVolume;
                    clearInterval(volumeInterval);
                } else {
                    bgm.volume += (targetVolume > currentVol ? step : -step);
                }
            }, 50);
        }

        function bukaUndangan() {
            document.getElementById('overlay-awal').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('overlay-awal').classList.add('hidden');
                document.getElementById('gate-container').classList.remove('hidden');
            }, 1000);
        }

        function bukaGerbang() {
            document.getElementById('gate-container').classList.add('gate-open');
            v1.style.opacity = '1'; v1.play();
            bgm.currentTime = 2.24; bgm.volume = 0.5; bgm.play(); bgm.loop = true;
            document.getElementById('sfx-gerbang').play();
            setBgmVolume(0.1); 
            setTimeout(() => { narasiGerbang.play(); }, 800); 
            narasiGerbang.onended = () => { setBgmVolume(0.5); };
            setTimeout(() => {
                v1.style.opacity = '0'; fotoBg.style.opacity = '1';
                document.getElementById('main-content').style.opacity = '1';
                startPatrol();
            }, 3000);
            setTimeout(() => { document.getElementById('gate-container').classList.add('hidden'); }, 3100);
        }

        function zoomFoto(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lb.style.display = 'flex';
        }

        function simpanUcapan() {
            const nama = document.getElementById('input-nama').value.trim();
            const teks = document.getElementById('input-teks').value.trim();
            if(!nama || !teks) { alert("Harap isi nama dan ucapan doa restu Anda."); return; }
            let dataLama = localStorage.getItem('undangan_ucapan');
            let listUcapan = dataLama ? JSON.parse(dataLama) : [];
            listUcapan.unshift({ nama: nama, teks: teks }); 
            localStorage.setItem('undangan_ucapan', JSON.stringify(listUcapan));
            document.getElementById('input-nama').value = '';
            document.getElementById('input-teks').value = '';
            tampilkanUcapan();
        }

        function tampilkanUcapan() {
            const container = document.getElementById('box-list-ucapan');
            if(!container) return;
            let dataLama = localStorage.getItem('undangan_ucapan');
            let listUcapan = dataLama ? JSON.parse(dataLama) : [];
            let htmlKomentar = `
                <div class="box-komentar pinned">
                    <div class="nama-komentator">Latifa & Ilmi <span class="badge-owner">Mempelai</span></div>
                    <div class="isi-komentator">Terima kasih ucapan & doa nya, ditunggu kehadiran saudara/i semua🤍</div>
                </div>
            `;
            listUcapan.forEach(item => {
                htmlKomentar += `
                    <div class="box-komentar">
                        <div class="nama-komentator">${item.nama}</div>
                        <div class="isi-komentator">${item.teks}</div>
                    </div>
                `;
            });
            container.innerHTML = htmlKomentar;
        }

        function runCountdown() {
            const targetDate = new Date("June 14, 2026 00:00:00").getTime();
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const now = new Date().getTime();
                const distance = targetDate - now;
                let days = Math.floor(distance / (1000 * 60 * 60 * 24));
                let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                let seconds = Math.floor((distance % (1000 * 60)) / 1000);
                if (distance < 0) { clearInterval(countdownInterval); days = hours = minutes = seconds = 0; }
                const dStr = String(days).padStart(2, '0');
                const hStr = String(hours).padStart(2, '0');
                const mStr = String(minutes).padStart(2, '0');
                const sStr = String(seconds).padStart(2, '0');
                if (document.getElementById("d1")) {
                    document.getElementById("d1").innerText = dStr[0]; document.getElementById("d2").innerText = dStr[1];
                    document.getElementById("h1").innerText = hStr[0]; document.getElementById("h2").innerText = hStr[1];
                    document.getElementById("m1").innerText = mStr[0]; document.getElementById("m2").innerText = mStr[1];
                    document.getElementById("s1").innerText = sStr[0]; document.getElementById("s2").innerText = sStr[1];
                }
            }, 1000);
        }

        function putarSuara(judul, idSuara, isTentang = false) {
            const mTitle = document.getElementById('m-title');
            const mBody = document.getElementById('m-body');
            mTitle.innerText = judul; 
            if (isTentang) {
                mBody.innerHTML = `
                    <div class="tentang-wrapper">
                        <img src="kami.png" style="width: 100%; height: auto; display: block;">
                        <div class="overlay-layer">
                            <a href="https://instagram.com/_illmii" target="_blank" class="ig-pria" style="top:46%; left:65%; z-index: 100;">@_illmii</a>
                            <a href="https://instagram.com/latifaries" target="_blank" class="ig-wanita" style="top:46%; left:18%; z-index: 40;">@latifaries</a>
                        </div>
                    </div>
                `;
            } else if (judul === 'Love Story') {
                mBody.innerHTML = `<div style="width: 100%; height: auto; display: flex; justify-content: center;"><img src="story.png" style="width: 100%; height: auto; border-radius: 4px;"></div>`;
            } else if (judul === 'Ucapan & Doa') {
                mBody.innerHTML = `<div class="form-ucapan"><input type="text" id="input-nama" placeholder="Nama Anda" maxlength="40"><textarea id="input-teks" placeholder="Tuliskan ucapan doa restu Anda..." rows="3" maxlength="300"></textarea><button class="btn-kirim-ucapan" onclick="simpanUcapan()">Kirim Ucapan</button></div><div class="area-komentar" id="box-list-ucapan"></div>`;
                tampilkanUcapan();
            } else if (judul === 'Rangkaian Acara') {
                mBody.innerHTML = `<div class="custom-img-container" style="margin-top: 10px;"><img src="rangkai.png" style="width: 100%; height: auto; border-radius: 4px;"></div>`;
            } else if (judul === 'Waktu & Tempat') {
                mBody.innerHTML = `<div class="acara-container"><div class="countdown-box-wrapper"><div class="flip-segment"><div class="flip-card-container"><div id="d1" class="flip-card">0</div><div id="d2" class="flip-card">0</div></div><span class="flip-label">Hari</span></div><div class="flip-segment"><div class="flip-card-container"><div id="h1" class="flip-card">0</div><div id="h2" class="flip-card">0</div></div><span class="flip-label">Jam</span></div><div class="flip-segment"><div class="flip-card-container"><div id="m1" class="flip-card">0</div><div id="m2" class="flip-card">0</div></div><span class="flip-label">Menit</span></div><div class="flip-segment"><div class="flip-card-container"><div id="s1" class="flip-card">0</div><div id="s2" class="flip-card">0</div></div><span class="flip-label">Detik</span></div></div><div class="custom-img-container"><img src="waktu.png"></div><div class="maps-img-container"><p style="font-size: 14px; font-weight: bold; color: #414528; margin-bottom: 8px;">Google Maps Lokasi</p><a href="https://g.co/kgs/4M9iUc" target="_blank"><img src="maps.png"></a></div></div>`;
                runCountdown(); 
            } else if (judul === 'Galeri') {
                mBody.innerHTML = `<div class="galeri-scroll-container" style="display: flex; flex-direction: column; width: 100%; padding-bottom: 10px; gap: 8px;">
                    <img src="1.png" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="2.png" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="3.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="4.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="5.png" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="6.png" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="7.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="8.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="9.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="10.png" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="11.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="12.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="13.png" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="14.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="15.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="16.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="17.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                    <img src="18.jpg" onclick="zoomFoto(this.src)" style="width: 100%; height: auto; cursor: pointer;">
                </div>`;
            }
            document.getElementById('modal').style.display = 'flex';
            if (suaraAktif) { suaraAktif.pause(); suaraAktif.currentTime = 0; }
            suaraAktif = document.getElementById(idSuara); setBgmVolume(0.1); 
            setTimeout(() => { if(document.getElementById('modal').style.display === 'flex') { suaraAktif.play(); } }, 600); 
            suaraAktif.onended = () => { setBgmVolume(0.5); };
        }

        function tutup() {
            document.getElementById('modal').style.display = 'none';
            if (suaraAktif) { suaraAktif.pause(); suaraAktif.currentTime = 0; }
            clearInterval(countdownInterval); setBgmVolume(0.5); 
        }

        function startPatrol() {
            if (window.isEating) return;
            bubble.innerText = "meow meow"; bubble.style.opacity = "1";
            walkL.classList.add('hidden'); walkR.classList.remove('hidden'); walkR.play();
            catBox.style.transition = "left 6s linear, bottom 0.5s ease";
            catBox.style.left = "calc(110% - 140px)"; 
            setTimeout(() => {
                if (window.isEating) return;
                walkR.classList.add('hidden'); walkL.classList.remove('hidden'); walkL.play();
                catBox.style.left = "110px"; 
                setTimeout(() => { if (!window.isEating) startPatrol(); }, 7000);
            }, 7000);
        }

        function panggilKucing() {
            if (window.isEating) return;
            window.isEating = true;
            foodWrapper.classList.remove('pulse-active');
            bubble.innerText = "Terima kasih, meow!"; bubble.style.opacity = "1";
            catBox.style.transition = "left 3s ease-out, bottom 3s ease-out"; 
            
            /* Koordinat kucing menyamperkan wadah makan yang sudah disesuaikan posisinya */
            catBox.style.left = "15px"; 
            catBox.style.bottom = "36px"; 
            
            walkR.classList.add('hidden'); walkL.classList.remove('hidden'); walkL.play();
            setTimeout(() => {
                walkL.classList.add('hidden'); eatV.classList.remove('hidden'); eatV.play();
                catBox.style.transition = "none"; catBox.style.width = "70px"; 
                setTimeout(() => {
                    eatV.classList.add('hidden'); bubble.style.opacity = "0";
                    window.isEating = false; foodWrapper.classList.add('pulse-active');
                    catBox.style.transition = "bottom 0.5s ease, width 0.5s ease";
                    
                    /* Dikembalikan persis menapak di atas rumput semula */
                    catBox.style.bottom = "2px"; 
                    catBox.style.width = "140px"; 
                    startPatrol();
                }, 5000);
            }, 3000); 
        }
    </script>
</body>
