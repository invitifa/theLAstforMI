<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Invitation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        /* --- BACKGROUND SISA LAYAR HP MENJADI PUTIH BERSIH --- */
        body, html { 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* --- BINGKAI UTAMA: Mengunci ukuran dan rasio murni 9:16 di semua jenis HP --- */
        .app-container {
            position: relative;
            width: 100%;
            max-width: 450px; 
            max-height: 800px; 
            aspect-ratio: 9 / 16;
            overflow: hidden;
            background: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        /* --- 1. OVERLAY AWAL --- */
        #overlay-awal {
            position: absolute; inset: 0; z-index: 100;
            background: url('awal.png') center/cover no-repeat;
            display: block; transition: opacity 1s ease;
        }

        .btn-buka {
            position: absolute;
            bottom: 44%; 
            left: 50%;
            transform: translateX(-50%);
            padding: 1.25vh 6.5vw; border: 2px solid rgba(255,255,255,0.5); border-radius: 12px;
            background: #c18f30; color: white; cursor: pointer; font-weight: 800;
            text-transform: uppercase; letter-spacing: 3px; font-size: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); transition: all 0.3s ease;
            white-space: nowrap;
        }

        /* --- 2. SISTEM GERBANG --- */
        #gate-container { position: absolute; inset: 0; z-index: 50; display: flex; overflow: hidden; cursor: pointer; perspective: 1200px; }
        .gate { 
            width: 50%; height: 100%; 
            transition: transform 3s cubic-bezier(0.4, 0, 0.2, 1), opacity 3s; 
            background-image: url('gerbang.png'); 
            background-size: 200% 100%; 
            background-repeat: no-repeat; 
            backface-visibility: hidden; 
        }
        .gate-left { background-position: left center; transform-origin: left; }
        .gate-right { background-position: right center; transform-origin: right; }
        .gate-open .gate-left { transform: rotateY(-110deg); opacity: 0; }
        .gate-open .gate-right { transform: rotateY(110deg); opacity: 0; }

        /* --- 3. BACKGROUND MEDIA --- */
        #bg-container { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        .bg-media { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: opacity 1.5s; opacity: 0; }

        /* --- 4. IKON MENU (RESPONSIF BERBASIS PERSEN) --- */
        #main-content { position: absolute; inset: 0; z-index: 10; opacity: 0; transition: opacity 2s ease-in-out; pointer-events: none; }
        #hint-text { position: absolute; top: 25%; left: 50%; transform: translateX(-50%); color: #8a9549; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,0,0,0.5); animation: softFlicker 3s infinite ease-in-out; pointer-events: none; text-align: center; width: 100%; }
        @keyframes softFlicker { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
        
        .icon-item { position: absolute; height: auto; cursor: pointer; pointer-events: auto; animation: floatWobble 6s ease-in-out infinite; }
        .icon-item img { width: 100%; height: auto; display: block; filter: drop-shadow(4px 6px 10px rgba(0, 0, 0, 0.4)); transition: transform 0.3s ease; }
        @keyframes floatWobble { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-1vh) rotate(1deg); } 50% { transform: translateY(-0.5vh) rotate(-1deg); } 75% { transform: translateY(-1.25vh) rotate(0.5deg); } }
        
        .icon-1 { width: 25.5%; top: 36%; left: 7.5%; }
        .icon-2 { width: 26.6%; top: 47%; left: 44.2%; }
        .icon-3 { width: 29.3%; top: 42%; left: 68%; }
        .icon-4 { width: 22.2%; top: 59.5%; left: 54.5%; }
        .icon-5 { width: 31.1%; top: 71%; left: 43%; }
        .icon-6 { width: 44.4%; top: 56%; left: 6%; }

        /* --- 5. KUCING, MAKANAN, RUMPUT (RESPONSIF BERBASIS PERSEN) --- */
        #cat-area { position: absolute; bottom: 0; left: 0; width: 100%; height: 32.5%; z-index: 20; pointer-events: none; }
        
        #food-wrapper { 
            position: absolute; 
            pointer-events: auto; 
            z-index: 50; 
            width: 20%; 
            left: 5.3%; 
            bottom: 7%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .pulse-active { animation: bowlShake 0.8s infinite ease-in-out; }
        @keyframes bowlShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-1.5px) rotate(-1deg); } 75% { transform: translateX(1.5px) rotate(1deg); } }
        #cat-food-icon { width: 100%; cursor: pointer; filter: drop-shadow(4px 10px 8px rgba(0,0,0,0.6)); }
        
        #cat-container { 
            position: absolute; 
            left: 26.6%; 
            pointer-events: auto; 
            z-index: 21; 
            width: 33.3%; 
            height: auto;
            aspect-ratio: 1 / 1;
            bottom: -4%; 
        }
        #cat-bubble { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.9); padding: 2px 6px; border-radius: 8px; font-size: 10px; font-weight: bold; color: #333; opacity: 0; transition: opacity 0.3s; z-index: 100; white-space: nowrap; }
        .cat-vid { width: 100%; height: 100%; object-fit: contain; }
        
        #grass-layer { position: absolute; bottom: 0; left: 0; width: 100%; pointer-events: none; z-index: 30; display: flex; align-items: flex-end; }
        #grass-image { width: 100%; height: auto; }

        /* --- 6. MODAL SYSTEM --- */
        #modal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 0px; width: 100%; max-width: 450px; height: 100%; max-height: 100vh; display: flex; flex-direction: column; position: relative; }
        #m-body { overflow-y: auto; margin-top: 15px; padding-right: 5px; position: relative; flex: 1; display: flex; flex-direction: column; }
        #m-body::-webkit-scrollbar { width: 4px; }
        #m-body::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }

        .tentang-wrapper { position: relative; width: 100%; max-width: 450px; margin: 0 auto; text-align: center; overflow: hidden; }
        .overlay-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .ig-pria, .ig-wanita, .foto-pria, .foto-wanita { position: absolute; }
        .ig-pria, .ig-wanita { text-decoration: none; font-size: 3.6vw; font-weight: 800; color: #d4af37; pointer-events: auto; white-space: nowrap; animation: igPulse 2s infinite ease-in-out; }
        @keyframes igPulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px rgba(212,175,55,0)); } 50% { transform: scale(1.06); filter: drop-shadow(0 0 4px rgba(212,175,55,0.6)); } }
        .foto-pria, .foto-wanita { object-fit: contain; pointer-events: none; }
        @media (min-width: 450px) { .ig-pria, .ig-wanita { font-size: 16px; } }

        /* --- 🌟 FORM UCAPAN (TEMA SAGE & HIJAU TUA) 🌟 --- */
        .form-ucapan { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-bottom: 20px; 
            background: #8a9549; 
            padding: 15px; 
            border-radius: 14px; 
            border: 1px solid #8a9549;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .form-ucapan input, .form-ucapan textarea { 
            width: 100%; 
            padding: 11px 14px; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 10px; 
            font-size: 13px; 
            outline: none; 
            background: #ffffff;
            color: #414528; 
            font-weight: 600;
            transition: all 0.3s;
        }
        .form-ucapan input::placeholder, 
        .form-ucapan textarea::placeholder {
            color: #414528;
            opacity: 0.55;
            font-weight: 500;
        }
        .form-ucapan input:focus, .form-ucapan textarea:focus { 
            border-color: #ffffff; 
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.4);
        }
        .btn-kirim-ucapan { 
            background: #414528; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px; 
            transition: background 0.2s; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-kirim-ucapan:hover { background: #2f321d; }

        /* --- 🌟 AREA ALIRAN BUBBLE CHAT 🌟 --- */
        .area-komentar { 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            margin-top: 5px; 
            flex: 1;
            overflow-y: auto; 
            padding: 5px 6px 15px 4px;
        }
        .area-komentar::-webkit-scrollbar { width: 3px; }
        .area-komentar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .chat-row { display: flex; flex-direction: column; width: 100%; }
        .chat-row.tamu { align-items: flex-start; }
        .chat-row.mempelai { align-items: flex-end; }

        .nama-komentator { 
            font-size: 11px; 
            font-weight: 700; 
            color: #414528; 
            margin-bottom: 4px; 
            margin-left: 6px;
            margin-right: 6px;
            display: flex; 
            align-items: center; 
            gap: 5px; 
        }
        
        .box-komentar { 
            max-width: 85%; 
            padding: 10px 14px; 
            font-size: 13px;
            line-height: 1.45;
            word-break: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        
        .chat-row.tamu .box-komentar {
            background: #f1f5f9; 
            color: #334155; 
            border-radius: 4px 16px 16px 16px; 
            text-align: left;
        }
        
        .chat-row.mempelai .box-komentar {
            background: #e2e8f0;
            border-radius: 16px 4px 16px 16px;
            text-align: right;
        }
        .box-komentar.pinned { 
            background: #e9edd9 !important; 
            color: #3c4724;
            border: 1px solid rgba(138, 149, 73, 0.2);
        }
        .badge-owner { 
            background: #8a9549; 
            color: white; 
            font-size: 9px; 
            padding: 1px 5px; 
            border-radius: 4px; 
            font-weight: normal; 
        }
        .isi-komentator { font-size: 13px; }

        /* --- RANGKAIAN ACARA & COUNTDOWN --- */
        .acara-container { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; margin-top: 10px; }
        .info-lokasi-waktu { font-size: 14px; color: #444; font-weight: 600; margin-bottom: 15px; line-height: 1.5; }
        .countdown-box-wrapper { display: flex; gap: 12px; justify-content: center; margin-bottom: 25px; }
        .flip-segment { display: flex; flex-direction: column; align-items: center; }
        .flip-card-container { display: flex; gap: 2px; }
        .flip-card { position: relative; background: #414528; color: #fff; width: 32px; height: 46px; font-size: 26px; font-weight: 700; text-align: center; line-height: 46px; border-radius: 4px; box-shadow: 0 3px 6px rgba(120, 120, 120, 0.3); overflow: hidden; }
        .flip-card::after { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 1px; background: rgba(255, 255, 255, 0.15); z-index: 5; }
        .flip-label { font-size: 10px; color: #777; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 6px; font-weight: bold; }

        .custom-img-container { width: 100%; display: flex; justify-content: center; margin-bottom: 15px; }
        .custom-img-container img { width: 100%; height: auto; max-width: 450px; display: block; object-fit: cover; }
        .maps-img-container { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .maps-img-container a { display: block; width: 100%; max-width: 450px; cursor: pointer; transition: transform 0.2s; }
        .maps-img-container a:hover { transform: scale(1.02); }
        .maps-img-container img { width: 100%; height: auto; display: block; object-fit: cover; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12)); }

        #lightbox { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; cursor: pointer; }
        #lightbox img { max-width: 90%; max-height: 80%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="overlay-awal">
            <button class="btn-buka" onclick="bukaUndangan()">Mulai</button>
        </div>

        <div id="gate-container" class="hidden" onclick="bukaGerbang()">
            <div class="gate gate-left"></div>
            <div class="gate gate-right"></div>
        </div>

        <div id="main-content">
            <div id="bg-container">
                <img src="bg.png" class="bg-media" id="bg-img" alt="Background">
            </div>
            
            <div id="hint-text">TAP IKON UNTUK MEMBUKA MENU</div>

            <div class="icon-item icon-1" onclick="openModal('tentang')"><img src="menu1.png" alt="Tentang"></div>
            <div class="icon-item icon-2" onclick="openModal('acara')"><img src="menu2.png" alt="Acara"></div>
            <div class="icon-item icon-3" onclick="openModal('galeri')"><img src="menu3.png" alt="Galeri"></div>
            <div class="icon-item icon-4" onclick="openModal('cerita')"><img src="menu4.png" alt="Cerita"></div>
            <div class="icon-item icon-5" onclick="openModal('ucapan')"><img src="menu5.png" alt="Ucapan"></div>
            <div class="icon-item icon-6" onclick="openModal('hadiah')"><img src="menu6.png" alt="Hadiah"></div>
        </div>

        <div id="cat-area" class="hidden">
            <div id="food-wrapper">
                <img src="makanan.png" id="cat-food-icon" onclick="beriMakan()" alt="Makanan Kucing">
            </div>
            <div id="cat-container" onclick="sentuhKucing()">
                <div id="cat-bubble">Meow!</div>
                <video id="cat-video" class="cat-vid" loop muted playsinline>
                    <source src="kucing_diam.mp4" type="video/mp4">
                </video>
            </div>
            <div id="grass-layer">
                <img src="rumput.png" id="grass-image" alt="Rumput">
            </div>
        </div>
    </div>

    <audio id="backsound" loop>
        <source src="backsound.mp3" type="audio/mp4">
    </audio>

    <div id="modal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="m-body"></div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" alt="Lightbox">
    </div>

    <script>
        const overlayAwal = document.getElementById('overlay-awal');
        const gateContainer = document.getElementById('gate-container');
        const mainContent = document.getElementById('main-content');
        const catArea = document.getElementById('cat-area');
        const bgImg = document.getElementById('bg-img');
        const audio = document.getElementById('backsound');

        const catVideo = document.getElementById('cat-video');
        const catBubble = document.getElementById('cat-bubble');
        const foodWrapper = document.getElementById('food-wrapper');

        let catState = 'diam'; // diam, makan, manja
        let bubbleTimeout, stateTimeout;

        function bukaUndangan() {
            overlayAwal.style.opacity = '0';
            setTimeout(() => {
                overlayAwal.style.display = 'none';
                gateContainer.classList.remove('hidden');
            }, 1000);
            audio.play().catch(() => console.log("Audio play blocked"));
        }

        function bukaGerbang() {
            gateContainer.classList.add('gate-open');
            mainContent.style.pointerEvents = 'auto';
            mainContent.style.opacity = '1';
            bgImg.style.opacity = '1';
            
            setTimeout(() => {
                catArea.classList.remove('hidden');
                catVideo.play();
            }, 1500);

            setTimeout(() => {
                gateContainer.style.display = 'none';
            }, 3000);
        }

        // --- SISTEM GAME KUCING INTERAKTIF ---
        function gantiVideoKucing(namaFile, statusBaru) {
            catState = statusBaru;
            catVideo.src = namaFile;
            catVideo.load();
            catVideo.play();
        }

        function tampilBubble(teks) {
            clearTimeout(bubbleTimeout);
            catBubble.innerText = teks;
            catBubble.style.opacity = '1';
            bubbleTimeout = setTimeout(() => { catBubble.style.opacity = '0'; }, 3000);
        }

        function beriMakan() {
            if(catState !== 'diam') return;
            foodWrapper.classList.add('pulse-active');
            gantiVideoKucing('kucing_makan.mp4', 'makan');
            tampilBubble('Nyam nyam.. enak!');

            clearTimeout(stateTimeout);
            stateTimeout = setTimeout(() => {
                foodWrapper.classList.remove('pulse-active');
                gantiVideoKucing('kucing_diam.mp4', 'diam');
            }, 5000);
        }

        function sentuhKucing() {
            if(catState === 'makan') {
                tampilBubble('Jangan diganggu, lagi makan!');
                return;
            }
            clearTimeout(stateTimeout);
            gantiVideoKucing('kucing_manja.mp4', 'manja');
            
            const respon = ['Purr... sayang kamu!', 'Usap terus kak~', 'Meoww, nyaman sekali'];
            tampilBubble(respon[Math.floor(Math.random() * respon.length)]);

            stateTimeout = setTimeout(() => {
                gantiVideoKucing('kucing_diam.mp4', 'diam');
            }, 4000);
        }

        // --- MANAJEMEN WINDOW MODAL & KONTEN TEMPLATE ---
        function openModal(jenis) {
            const body = document.getElementById('m-body');
            body.innerHTML = ''; 

            if(jenis === 'tentang') {
                body.innerHTML = `
                    <div class="tentang-wrapper">
                        <img src="tentang_base.png" style="width:100%; height:auto; display:block;" alt="Base">
                        <div class="overlay-layer">
                            <img src="foto_pria.png" class="foto-pria" style="top:15%; left:10%; width:35%;" alt="Pria">
                            <img src="foto_wanita.png" class="foto-wanita" style="top:15%; right:10%; width:35%;" alt="Wanita">
                            <a href="https://instagram.com/pria" target="_blank" class="ig-pria" style="top:55%; left:15%;">@mempelai_pria</a>
                            <a href="https://instagram.com/wanita" target="_blank" class="ig-wanita" style="top:55%; right:15%;">@mempelai_wanita</a>
                        </div>
                    </div>`;
            } 
            else if(jenis === 'acara') {
                body.innerHTML = `
                    <div class="custom-img-container"><img src="acara_header.png" alt="Header"></div>
                    <div class="acara-container">
                        <div class="info-lokasi-waktu">
                            Ahad, 22 Maret 2026<br>Pukul 09.00 WITA - Selesai<br>Gedung Serbaguna Banjarmasin
                        </div>
                        <div class="countdown-box-wrapper" id="countdown-render"></div>
                    </div>
                    <div class="maps-img-container">
                        <a href="https://maps.google.com" target="_blank">
                            <img src="maps_button.png" alt="Tombol Lokasi">
                        </a>
                    </div>
                    <div class="custom-img-container"><img src="acara_footer.png" alt="Footer"></div>`;
                initCountdown();
            }
            else if(jenis === 'galeri') {
                body.innerHTML = `
                    <div class="custom-img-container"><img src="galeri_banner.png" alt="Banner"></div>
                    <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; padding:10px 0;">
                        <img src="g1.png" style="width:100%; border-radius:8px; cursor:pointer;" onclick="viewLightbox(this.src)" alt="G1">
                        <img src="g2.png" style="width:100%; border-radius:8px; cursor:pointer;" onclick="viewLightbox(this.src)" alt="G2">
                        <img src="g3.png" style="width:100%; border-radius:8px; cursor:pointer;" onclick="viewLightbox(this.src)" alt="G3">
                        <img src="g4.png" style="width:100%; border-radius:8px; cursor:pointer;" onclick="viewLightbox(this.src)" alt="G4">
                    </div>`;
            }
            else if(jenis === 'cerita') {
                body.innerHTML = `
                    <div class="custom-img-container"><img src="cerita1.png" alt="Cerita 1"></div>
                    <div class="custom-img-container"><img src="cerita2.png" alt="Cerita 2"></div>`;
            }
            else if(jenis === 'ucapan') {
                body.innerHTML = `
                    <div class="form-ucapan">
                        <input type="text" id="input-nama" placeholder="Nama Anda" required>
                        <textarea id="input-pesan" rows="3" placeholder="Tuliskan ucapan dan doa restu Anda..." required></textarea>
                        <button class="btn-kirim-ucapan" onclick="kirimPesan()">Kirim Ucapan</button>
                    </div>
                    <div class="area-komentar" id="box-aliran-chat">
                        <div class="chat-row mempelai">
                            <div class="nama-komentator"><span class="badge-owner">Mempelai</span></div>
                            <div class="box-komentar pinned">Terima kasih atas ucapan dan doa restu dari teman-teman semua. Sampai jumpa di hari bahagia kami! 🤍</div>
                        </div>
                        <div class="chat-row tamu">
                            <div class="nama-komentator">Budi Santoso</div>
                            <div class="box-komentar">Selamat menempuh hidup baru! Semoga menjadi keluarga yang sakinah, mawaddah, warahmah. Amin.</div>
                        </div>
                    </div>`;
            }
            else if(jenis === 'hadiah') {
                body.innerHTML = `
                    <div class="custom-img-container"><img src="hadiah1.png" alt="Hadiah 1"></div>
                    <div class="custom-img-container"><img src="hadiah2.png" alt="Hadiah 2"></div>`;
            }

            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal(e) {
            document.getElementById('modal').style.display = 'none';
            if(window.countdownInterval) clearInterval(window.countdownInterval);
        }

        function viewLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        // --- MANAJEMEN SISTEM REALTIME CHAT SIMULASI ---
        function kirimPesan() {
            const nama = document.getElementById('input-nama').value.trim();
            const pesan = document.getElementById('input-pesan').value.trim();
            if(!nama || !pesan) return alert('Silakan lengkapi nama dan pesan Anda.');

            const container = document.getElementById('box-aliran-chat');
            const baru = document.createElement('div');
            baru.className = 'chat-row tamu';
            baru.innerHTML = `
                <div class="nama-komentator">${nama}</div>
                <div class="box-komentar">${pesan}</div>
            `;
            container.insertBefore(baru, container.firstChild);

            document.getElementById('input-nama').value = '';
            document.getElementById('input-pesan').value = '';
        }

        // --- SISTEM DIGITAL COUNTDOWN TARGET ---
        function initCountdown() {
            const target = new Date("March 22, 2026 09:00:00").getTime();
            const renderArea = document.getElementById('countdown-render');

            function updateCard() {
                const now = new Date().getTime();
                const diff = target - now;

                if (diff <= 0) {
                    renderArea.innerHTML = "<h4>Acara Telah Dimulai!</h4>";
                    clearInterval(window.countdownInterval);
                    return;
                }

                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);

                renderArea.innerHTML = `
                    ${createFlipSegment(d, 'Hari')}
                    ${createFlipSegment(h, 'Jam')}
                    ${createFlipSegment(m, 'Menit')}
                    ${createFlipSegment(s, 'Detik')}
                `;
            }

            function createFlipSegment(val, label) {
                const str = String(val).padStart(2, '0');
                return `
                    <div class="flip-segment">
                        <div class="flip-card-container">
                            <div class="flip-card">${str[0]}</div>
                            <div class="flip-card">${str[1]}</div>
                        </div>
                        <div class="flip-label">${label}</div>
                    </div>`;
            }

            updateCard();
            window.countdownInterval = setInterval(updateCard, 1000);
        }
    </script>
</body>
</html>
